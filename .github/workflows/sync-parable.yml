name: Sync parable.py from upstream Dippy

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for upstream changes
        id: check
        run: |
          python scripts/sync_parable.py --ci && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open PR if changed
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync parable.py from upstream Dippy'
          title: 'chore: sync parable.py from upstream Dippy'
          body: |
            Automated sync of vendored `parable.py` from [ldayton/Dippy](https://github.com/ldayton/Dippy).

            Review the diff for any breaking changes to the public `parse()` API before merging.
          branch: chore/sync-parable
          delete-branch: true
